<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo Matemático dos Triângulos</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            background-color: #333;
            border: 2px solid #555;
            display: block;
        }

        /* Interface de UI */
        .ui-layer {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }

        .ui-right {
            left: auto;
            right: 10px;
            text-align: right;
        }

        /* Telas de Fim de Jogo */
        #menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }

        h1 { margin-bottom: 20px; font-size: 32px; }
        p { margin-bottom: 30px; font-size: 18px; color: #ccc; }

        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #00bcd4;
            color: white;
            transition: background 0.3s;
        }

        button:hover { background-color: #008ba3; }
        button.close-btn { background-color: #f44336; }
        button.close-btn:hover { background-color: #d32f2f; }

        #closed-message {
            display: none;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        
        <div class="ui-layer">
            <div>Exército: <span id="lives-display" style="color: #FFD700">1</span></div>
        </div>
        <div class="ui-layer ui-right">
            <div>Tempo: <span id="time-display">60</span>s</div>
        </div>

        <div id="menu-screen">
            <h1 id="menu-title">Fim de Jogo</h1>
            <p id="menu-subtitle">Resultado</p>
            <div>
                <button onclick="resetGame()">Nova Partida</button>
                <button class="close-btn" onclick="closeGame()">Fechar Jogo</button>
            </div>
        </div>
    </div>

    <div id="closed-message">
        <h1>O jogo foi encerrado.</h1>
        <p>Atualize a página para reabrir.</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menuScreen = document.getElementById('menu-screen');
        const menuTitle = document.getElementById('menu-title');
        const menuSubtitle = document.getElementById('menu-subtitle');
        const livesDisplay = document.getElementById('lives-display');
        const timeDisplay = document.getElementById('time-display');

        const GAME_DURATION = 60;
        let gameRunning = true;
        let animationId;
        let frameCount = 0;
        let timeLeft = GAME_DURATION;

        const keys = { ArrowLeft: false, ArrowRight: false };

        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 30,
            speed: 7,
            count: 1,
            color: '#FFD700'
        };

        let objects = []; 

        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.code)) keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.code)) keys[e.code] = false; });

        class FallingObject {
            constructor() {
                this.size = 35; // Aumentei um pouco para caber o texto
                this.x = Math.random() * (canvas.width - this.size * 2) + this.size;
                this.y = -40;
                this.speed = 3 + Math.random() * 3;
                
                // Define se é Triângulo (Bom) ou Círculo (Ruim)
                this.type = Math.random() > 0.5 ? 'triangle' : 'circle';
                
                // Define a operação matemática e o valor
                this.operator = '';
                this.value = 0;
                this.displayText = '';

                if (this.type === 'triangle') {
                    // TRIÂNGULOS: Soma ou Multiplicação
                    // 20% chance de multiplicar, 80% de somar
                    if (Math.random() < 0.2) {
                        this.operator = 'multiply';
                        this.value = Math.floor(Math.random() * 2) + 2; // x2 ou x3
                        this.displayText = 'x' + this.value;
                    } else {
                        this.operator = 'add';
                        this.value = Math.floor(Math.random() * 5) + 1; // +1 a +5
                        this.displayText = '+' + this.value;
                    }
                } else {
                    // CÍRCULOS: Subtração ou Divisão
                    // 20% chance de dividir, 80% de subtrair
                    if (Math.random() < 0.2) {
                        this.operator = 'divide';
                        this.value = 2; // Divide por 2
                        this.displayText = '/2';
                    } else {
                        this.operator = 'subtract';
                        this.value = Math.floor(Math.random() * 8) + 1; // -1 a -8
                        this.displayText = '-' + this.value;
                    }
                }
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.beginPath();
                
                // Desenha a forma
                if (this.type === 'triangle') {
                    ctx.fillStyle = '#4CAF50'; // Verde
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x - this.size/2, this.y + this.size);
                    ctx.lineTo(this.x + this.size/2, this.y + this.size);
                    ctx.fill();
                    
                    // Ajuste de posição do texto para triângulo
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(this.displayText, this.x, this.y + (this.size * 0.75));
                } else {
                    ctx.fillStyle = '#F44336'; // Vermelho
                    ctx.arc(this.x, this.y + this.size/2, this.size/2, 0, Math.PI * 2);
                    ctx.fill();

                    // Ajuste de posição do texto para círculo
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    // Centraliza verticalmente no círculo
                    ctx.fillText(this.displayText, this.x, this.y + (this.size/2) + 5); 
                }
                
                ctx.closePath();
            }
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            // Desenha apenas uma representação visual simbólica se houver muitos
            const visualLimit = Math.min(player.count, 40); 

            for (let i = 0; i < visualLimit; i++) {
                let offsetX = 0;
                let offsetY = 0;

                if (i > 0) {
                    const spread = 10 + (Math.sqrt(player.count) * 2);
                    offsetX = (Math.random() - 0.5) * spread * 2;
                    offsetY = (Math.random() - 0.5) * spread;
                }

                const px = player.x + offsetX;
                const py = player.y + offsetY;
                const size = 20;

                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(px - size/2, py + size);
                ctx.lineTo(px + size/2, py + size);
                ctx.fill();
                ctx.closePath();
            }
        }

        function update() {
            if (!gameRunning) return;

            // Movimento
            if (keys.ArrowLeft && player.x > 30) player.x -= player.speed;
            if (keys.ArrowRight && player.x < canvas.width - 30) player.x += player.speed;

            // Gerar Objetos
            if (frameCount % 45 === 0) objects.push(new FallingObject());

            // Colisões e Lógica Matemática
            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                obj.update();

                if (obj.y > canvas.height) {
                    objects.splice(i, 1);
                    continue;
                }

                // Colisão
                const playerRadius = 20 + Math.sqrt(player.count) * 2;
                const dist = Math.hypot(player.x - obj.x, (player.y + 15) - (obj.y + 15));

                if (dist < playerRadius + 15) {
                    // Aplica a matemática baseada no objeto
                    if (obj.operator === 'add') {
                        player.count += obj.value;
                    } else if (obj.operator === 'multiply') {
                        player.count *= obj.value;
                    } else if (obj.operator === 'subtract') {
                        player.count -= obj.value;
                    } else if (obj.operator === 'divide') {
                        player.count = Math.floor(player.count / obj.value);
                    }

                    // Impede números quebrados ou negativos estranhos na exibição
                    player.count = Math.floor(player.count);

                    objects.splice(i, 1);

                    // Checa derrota
                    if (player.count <= 0) {
                        player.count = 0; // Visual fix
                        gameOver(false);
                    }
                }
            }

            // Timer
            if (frameCount % 60 === 0) {
                timeLeft--;
                if (timeLeft <= 0) gameOver(true);
            }

            frameCount++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameRunning) drawPlayer();
            objects.forEach(obj => obj.draw());
            
            livesDisplay.textContent = player.count;
            timeDisplay.textContent = timeLeft;
        }

        function loop() {
            if (gameRunning) {
                update();
                draw();
                animationId = requestAnimationFrame(loop);
            }
        }

        function gameOver(victory) {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            menuScreen.style.display = 'flex';
            
            if (victory) {
                menuTitle.innerText = "VITÓRIA!";
                menuSubtitle.innerText = `Exército Final: ${player.count} unidades!`;
                menuTitle.style.color = "#4CAF50";
            } else {
                menuTitle.innerText = "DERROTA";
                menuSubtitle.innerText = "Seu exército foi eliminado.";
                menuTitle.style.color = "#F44336";
            }
        }

        window.resetGame = function() {
            player.count = 1;
            player.x = canvas.width / 2;
            objects = [];
            timeLeft = GAME_DURATION;
            frameCount = 0;
            keys.ArrowLeft = false;
            keys.ArrowRight = false;
            menuScreen.style.display = 'none';
            gameRunning = true;
            loop();
        }

        window.closeGame = function() {
            document.getElementById('game-container').style.display = 'none';
            document.body.style.backgroundColor = '#111';
            document.getElementById('closed-message').style.display = 'block';
        }

        resetGame();

    </script>
</body>
</html>

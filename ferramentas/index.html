<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ferramentas — @ciromoura</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>

<body>

    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="shadow"></div>

    <header class="navbar">
        <div class="container">
            <div class="logo"><a href="../index.html">@ciromoura</a></div>
            <nav class="menu">
                <button class="close-btn">&times;</button>
                <ul>
                    <li><a href="../index.html">Início</a></li>
                    <li><a href="../index.html#sobre">Sobre</a></li>
                    <li><button id="theme-toggle" class="theme-btn"><i class="fas fa-moon"></i></button></li>
                </ul>
            </nav>
            <button class="hamburger"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <main>
        <section class="section inicio-section">
            <div class="container">
                <div class="inicio-content">
                    <div class="inicio-text card">
                        <h1 class="name-full">Ferramentas</h1>
                        <p>Utilitários e ferramentas online</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="section skills-section">
            <div class="container">
                <div id="content" class="content-area"></div>
                <div id="empty-state" class="empty-state" style="display:none;">
                    <div class="card">
                        <i class="fas fa-folder-open"></i>
                        <p>Nenhum conteúdo disponível ainda.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 @ciromoura. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        // Tema
        const themeToggle = document.getElementById('theme-toggle');
        const root = document.documentElement;
        if (root.getAttribute('data-theme') === 'dark') {
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }
        themeToggle.addEventListener('click', () => {
            const isDark = root.getAttribute('data-theme') === 'dark';
            if (isDark) {
                root.removeAttribute('data-theme');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                localStorage.setItem('theme', 'light');
            } else {
                root.setAttribute('data-theme', 'dark');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                localStorage.setItem('theme', 'dark');
            }
        });

        // Menu mobile
        const hamburger = document.querySelector('.hamburger');
        const menu = document.querySelector('.menu');
        const shadow = document.querySelector('.shadow');
        const closeBtn = document.querySelector('.close-btn');
        if (hamburger && menu && shadow && closeBtn) {
            hamburger.addEventListener('click', () => {
                menu.classList.toggle('active');
                shadow.style.display = menu.classList.contains('active') ? 'flex' : 'none';
            });
            closeBtn.addEventListener('click', () => {
                menu.classList.remove('active');
                shadow.style.display = 'none';
            });
            shadow.addEventListener('click', e => {
                if (e.target === shadow) {
                    menu.classList.remove('active');
                    shadow.style.display = 'none';
                }
            });
        }

        // Carrega manifest.json e renderiza categorias e páginas
        async function loadContent() {
            try {
                const res = await fetch('manifest.json');
                if (!res.ok) throw new Error('manifest não encontrado');
                const data = await res.json();
                renderCategories(data.categories);
            } catch {
                showEmpty();
            }
        }

        function renderCategories(categories) {
            if (!categories || categories.length === 0) { showEmpty(); return; }

            const container = document.getElementById('content');
            let hasItems = false;

            categories.forEach(cat => {
                if (!cat.items || cat.items.length === 0) return;
                hasItems = true;

                const section = document.createElement('div');
                section.className = 'category-section';

                const heading = document.createElement('h2');
                heading.textContent = cat.name;
                section.appendChild(heading);

                const grid = document.createElement('div');
                grid.className = 'items-grid';

                cat.items.forEach(item => {
                    const a = document.createElement('a');
                    a.href = item.href;
                    a.className = 'item-card card';
                    a.innerHTML = `
                        <span class="item-title">${item.title}</span>
                        ${item.description ? `<span class="item-desc">${item.description}</span>` : ''}
                        <i class="fas fa-arrow-right item-arrow"></i>
                    `;
                    grid.appendChild(a);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });

            if (!hasItems) showEmpty();
        }

        function showEmpty() {
            document.getElementById('empty-state').style.display = 'flex';
        }

        loadContent();
    </script>

</body>

</html>
